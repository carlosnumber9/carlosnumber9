name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: carlosnumber9
          filename: metrics.plugin.calendar.svg
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 0
